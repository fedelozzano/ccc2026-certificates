<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Certificados CCC 2026 — Siglo 21</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800&family=Playfair+Display:ital,wght@0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c0b;--surface:#101615;--surface2:#181f1d;
  --border:#1e2a28;--accent:#00e5a0;--accent2:#00c488;
  --text:#d8e8e2;--muted:#4a6660;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* HEADER UI */
header{background:#0a1210;border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;gap:14px}
.hdr-logo{height:28px;filter:brightness(0) invert(1)}
.hdr-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.hdr-sub{font-size:11px;color:var(--muted);margin-left:6px}

/* LAYOUT */
.app{display:flex;flex:1}

/* PANEL */
.panel{width:320px;min-width:280px;background:var(--surface);border-right:1px solid var(--border);padding:22px 18px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;max-height:calc(100vh - 54px)}
.sec{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.field label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:7px 10px;border-radius:4px;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent2)}
.field textarea{resize:vertical;min-height:55px;line-height:1.5}

/* Excel upload zone */
.upload-zone{border:1.5px dashed var(--border);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,229,160,.04)}
.upload-zone input{display:none}
.upload-zone .uz-icon{font-size:22px;margin-bottom:6px}
.upload-zone .uz-label{font-size:11.5px;font-weight:600;color:var(--muted)}
.upload-zone .uz-sub{font-size:10px;color:var(--muted);opacity:.6;margin-top:3px}

.batch-info{background:rgba(0,229,160,.06);border:1px solid rgba(0,229,160,.2);border-radius:5px;padding:10px 12px;font-size:11.5px;color:var(--accent)}
.batch-info strong{display:block;font-size:13px;margin-bottom:2px}

/* Participant list */
.part-list{max-height:140px;overflow-y:auto;border:1px solid var(--border);border-radius:4px;background:var(--surface2)}
.part-item{padding:6px 10px;font-size:11.5px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;transition:background .1s}
.part-item:last-child{border-bottom:none}
.part-item:hover,.part-item.active{background:rgba(0,229,160,.07)}
.part-item .pi-name{font-weight:600;color:var(--text)}
.part-item .pi-dni{color:var(--muted);font-size:10.5px}

/* Buttons */
.btn{width:100%;padding:10px 14px;border:none;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;margin-bottom:7px}
.btn-primary{background:var(--accent);color:#040f0c}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--muted);color:var(--text)}
.btn-batch{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.25)}
.btn-batch:hover{background:rgba(0,229,160,.18)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* Progress */
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;display:none}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .2s;border-radius:3px}

/* PREVIEW */
.preview-area{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:#060908;overflow:auto}
#cert-wrapper{transform-origin:center center}

/* ══ CERTIFICATE ══ */
.cert{
  width:1050px;height:742px;
  display:flex;flex-direction:column;
  font-family:'DM Sans',sans-serif;
  box-shadow:0 28px 72px rgba(0,0,0,.85);
  border-radius:6px;
  overflow:hidden;
  background:#fff;
}

/* Header band */
.cert-header{
  height:210px;
  background-size:cover;background-position:center top;
  flex-shrink:0;
  position:relative;
}
.cert-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,#00e5a0,#00a86e);
}

/* White body card */
.cert-card{
  flex:1;background:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:20px 80px 24px;
  text-align:center;
  position:relative;
}

.cert-title{
  font-family:'Exo 2',sans-serif;
  font-size:32px;font-weight:800;
  letter-spacing:.08em;text-transform:uppercase;
  color:#00c488;
  margin-bottom:14px;
}
.cert-intro{font-size:13px;color:#555;margin-bottom:6px;font-weight:400}
.cert-name{
  font-family:'Playfair Display',serif;
  font-size:42px;font-weight:400;font-style:italic;
  color:#0a1a14;line-height:1.1;margin-bottom:8px;
}
.cert-divider{width:380px;height:1px;background:#ccc;margin:0 auto 10px}
.cert-dni{font-size:13px;color:#444;font-weight:500;letter-spacing:.03em;margin-bottom:12px}
.cert-body{font-size:13.5px;color:#333;line-height:1.6;margin-bottom:18px}
.cert-body strong{font-weight:700;color:#0a1a14}

/* Signature area */
.cert-sig-area{display:flex;align-items:flex-end;justify-content:center;gap:0}
.cert-sig{display:flex;flex-direction:column;align-items:center;gap:1px}
.cert-sig-img{height:52px;object-fit:contain;margin-bottom:2px}
.cert-sig-name{font-size:14px;font-weight:700;color:#0a1a14;letter-spacing:.01em}
.cert-sig-role{font-size:11.5px;color:#666;font-style:italic;line-height:1.4}

@media(max-width:1380px){#cert-wrapper{transform:scale(.72)}}
@media(max-width:1150px){#cert-wrapper{transform:scale(.58)}}
@media(max-width:950px){
  .app{flex-direction:column}
  .panel{width:100%;max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  #cert-wrapper{transform:scale(.4)}
  .preview-area{min-height:380px}
}
</style>
</head>

let participants = [];
let sigImgData   = null;

document.addEventListener('DOMContentLoaded', render);

/* ── SIGNATURE IMAGE ── */
function loadSig(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { sigImgData = e.target.result; render(); };
  reader.readAsDataURL(file);
}

/* ── EXCEL LOAD ── */
function loadExcel(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseWorkbook(e.target.result);
  reader.readAsArrayBuffer(file);
}

function handleDrop(ev) {
  ev.preventDefault();
  document.getElementById('dropzone').classList.remove('drag');
  const file = ev.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseWorkbook(e.target.result);
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(ab) {
  const wb  = XLSX.read(ab, {type:'array'});
  const ws  = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
  
  // Detect columns (flexible: Nombre/Name/NOMBRE + DNI/Dni/dni)
  if (!rows.length) return alert('El archivo está vacío o no tiene el formato correcto.');
  const sample = rows[0];
  const keys   = Object.keys(sample);
  
  const nameKey = keys.find(k => /nombre|name/i.test(k)) || keys[0];
  const dniKey  = keys.find(k => /dni|doc|id/i.test(k))  || keys[1];
  
  participants = rows
    .filter(r => r[nameKey])
    .map(r => ({ nombre: String(r[nameKey]).trim(), dni: String(r[dniKey] || '').trim() }));

  if (!participants.length) return alert('No se encontraron participantes. Verificá las columnas.');

  showBatchInfo();
  // Auto-preview first participant
  document.getElementById('f-name').value = participants[0].nombre;
  document.getElementById('f-dni').value  = participants[0].dni;
  render();
}

function showBatchInfo() {
  const info = document.getElementById('batch-info');
  info.style.display = 'block';
  document.getElementById('batch-count').textContent = `${participants.length} participante${participants.length!==1?'s':''} cargados`;
  document.getElementById('batch-preview').textContent = participants.slice(0,3).map(p=>p.nombre).join(', ') + (participants.length>3?'…':'');
  
  document.getElementById('btn-batch').disabled = false;
  
  // Render list
  const list = document.getElementById('part-list');
  document.getElementById('part-list-wrap').style.display = 'block';
  list.innerHTML = participants.map((p,i) => `
    <div class="part-item ${i===0?'active':''}" onclick="selectPart(${i},this)">
      <span class="pi-name">${p.nombre}</span>
      <span class="pi-dni">${p.dni}</span>
    </div>`).join('');
}

function selectPart(i, el) {
  document.querySelectorAll('.part-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('f-name').value = participants[i].nombre;
  document.getElementById('f-dni').value  = participants[i].dni;
  render();
}

/* ── RENDER ── */
function getData() {
  return {
    name:    document.getElementById('f-name').value    || 'Nombre del Participante',
    dni:     document.getElementById('f-dni').value     || '',
    event:   document.getElementById('f-event').value   || '',
    signame: document.getElementById('f-signame').value || '',
    sigrole: document.getElementById('f-sigrole').value || '',
  };
}

function render() {
  const d = getData();
  document.getElementById('cert').innerHTML = buildCert(d, sigImgData);
}

function buildCert(d, sigImg) {
  const roleLines = d.sigrole.split('\n').join('<br>');
  return `
    <div class="cert-header" style="background-image:url('${HEADER_B64}')"></div>
    <div class="cert-card">
      <div class="cert-title">Certificado de Asistencia</div>
      <div class="cert-intro">Se otorga el presente certificado a</div>
      <div class="cert-name">${d.name}</div>
      <div class="cert-divider"></div>
      ${d.dni ? `<div class="cert-dni">DNI ${d.dni}</div>` : ''}
      <div class="cert-body">${d.event}</div>
      <div class="cert-sig-area">
        <div class="cert-sig">
          ${sigImg ? `<img class="cert-sig-img" src="${sigImg}" alt="firma"/>` : `<div style="height:52px;width:120px;border-bottom:1.5px solid #bbb;margin-bottom:4px"></div>`}
          <div class="cert-sig-name">${d.signame}</div>
          <div class="cert-sig-role">${roleLines}</div>
        </div>
      </div>
    </div>
  `;
}

/* ── DOWNLOAD SINGLE ── */
async function downloadOne() {
  const wrapper = document.getElementById('cert-wrapper');
  const prev = wrapper.style.transform;
  wrapper.style.transform = 'none';
  try {
    const canvas = await html2canvas(document.getElementById('cert'), {scale:2,useCORS:true,backgroundColor:null,logging:false});
    const a = document.createElement('a');
    const name = document.getElementById('f-name').value.replace(/\s+/g,'_') || 'certificado';
    a.download = `CCC2026_${name}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } finally { wrapper.style.transform = prev; }
}

/* ── DOWNLOAD ALL (ZIP) ── */
async function downloadAll() {
  if (!participants.length) return;
  const pbar  = document.getElementById('pbar');
  const pfill = document.getElementById('pfill');
  const btn   = document.getElementById('btn-batch');
  pbar.style.display = 'block';
  btn.disabled = true;

  const zip = new JSZip();
  const wrapper = document.getElementById('cert-wrapper');
  const prev    = wrapper.style.transform;
  wrapper.style.transform = 'none';
  
  const d = getData(); // get fixed fields (event, sig, etc.)
  const certEl = document.getElementById('cert');

  for (let i = 0; i < participants.length; i++) {
    const p = participants[i];
    certEl.innerHTML = buildCert({...d, name: p.nombre, dni: p.dni}, sigImgData);
    await new Promise(r => setTimeout(r, 60)); // allow paint
    
    const canvas = await html2canvas(certEl, {scale:2,useCORS:true,backgroundColor:null,logging:false});
    const blob   = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const fname  = `CCC2026_${p.nombre.replace(/\s+/g,'_')}.png`;
    zip.file(fname, blob);

    pfill.style.width = `${Math.round(((i+1)/participants.length)*100)}%`;
  }

  // Restore last preview
  render();
  wrapper.style.transform = prev;
  
  const zipBlob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'CCC2026_Certificados.zip';
  a.click();

  pbar.style.display = 'none';
  pfill.style.width = '0%';
  btn.disabled = false;
}

}
